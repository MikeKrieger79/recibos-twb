<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWB - Sistema Profesional</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background-color: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 10px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-container { display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; gap: 15px; }
        .logo-img { height: 60px; width: 60px; object-fit: cover; border-radius: 50%; border: 2px solid #58a6ff; }
        h2 { color: #58a6ff; margin: 0; font-size: 1.4em; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.8em; color: #8b949e; margin-bottom: 5px; font-weight: bold; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; width: 94%; font-size: 1em; }
        .btn { width: 100%; padding: 15px; margin-top: 25px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <img src="logo.png" alt="TWB" class="logo-img">
            <h2>THE WARRIOR BROTHERS</h2>
        </div>
        <div class="grid">
            <div class="full-width"><label>Cliente:</label><input type="text" id="cliente"></div>
            <div><label>WhatsApp:</label><input type="text" id="tel"></div>
            <div><label>Entrega:</label><input type="date" id="fecha"></div>
            <div class="full-width"><label>Artículo:</label><input type="text" id="articulo"></div>
            <div class="full-width"><label>Trabajo:</label><input type="text" id="trabajo"></div>
            <div><label>Total:</label><input type="number" id="total" value="0.00" step="0.01"></div>
            <div><label>Abono:</label><input type="number" id="abono" value="0.00" step="0.01"></div>
        </div>
        <button class="btn" onclick="enviar()">GENERAR Y ENVIAR</button>
    </div>

    <script>
        document.getElementById('fecha').valueAsDate = new Date();

        function enviar() {
            const cliente = document.getElementById('cliente').value.toUpperCase();
            const tel = document.getElementById('tel').value;
            const articulo = document.getElementById('articulo').value.toLowerCase();
            const trabajo = document.getElementById('trabajo').value;
            const total = parseFloat(document.getElementById('total').value).toFixed(2);
            const abono = parseFloat(document.getElementById('abono').value).toFixed(2);
            const saldo = (total - abono).toFixed(2);
            const fechaInput = document.getElementById('fecha').value;
            const fecha = fechaInput ? fechaInput.split('-').reverse().join('/') : '--/--/----';

            // ESTA ES LA SOLUCIÓN TÉCNICA: Códigos URL puros. 
            // GitHub no puede "romper" esto porque no hay emojis en el código.
            const s = decodeURIComponent('%F0%9F%9B%A1'); // Escudo
            const k = decodeURIComponent('%E2%9C%85');     // Check
            const h = decodeURIComponent('%F0%9F%9B%A0'); // Herramienta
            const b = decodeURIComponent('%F0%9F%92%B0'); // Bolsa
            const v = decodeURIComponent('%F0%9F%92%B5'); // Billete
            const t = decodeURIComponent('%F0%9F%92%B3'); // Tarjeta
            const c = decodeURIComponent('%F0%9F%93%85'); // Calendario
            const a = decodeURIComponent('%E2%9A%A0');     // Alerta
            const x = decodeURIComponent('%E2%9C%A8');     // Chispas

            let msg = s + " *THE WARRIOR BROTHERS*\n";
            msg += "-------------------------------------------\n";
            msg += "¡Hola *" + cliente + "*! " + k + "\n";
            msg += "Confirmamos la recepción de su *" + articulo + "*:\n\n";
            msg += h + " *Trabajo:* " + trabajo + "\n";
            msg += "-------------------------------------------\n";
            msg += b + " *Total:* $" + total + "\n";
            msg += v + " *Abono:* $" + abono + "\n";
            msg += t + " *Saldo pendiente:* *$" + saldo + "*\n";
            msg += "-------------------------------------------\n";
            msg += c + " *Entrega estimada:* " + fecha + "\n\n";
            msg += a + " *NOTA IMPORTANTE:*\n";
            msg += "• No se realizarán devoluciones de abonos.\n";
            msg += "• Trabajos no retirados en 2 meses se liquidarán.\n\n";
            msg += "¡Gracias por su confianza! " + x;

            const num = tel.startsWith('0') ? tel.substring(1) : tel;
            const finalURL = "https://wa.me/593" + num + "?text=" + encodeURIComponent(msg);
            
            window.location.href = finalURL;
        }
    </script>
</body>
</html>
