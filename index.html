<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWB - Sistema Profesional</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background-color: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 10px; width: 100%; max-width: 500px; }
        .header-container { display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; gap: 15px; }
        .logo-img { max-height: 60px; width: auto; border-radius: 5px; } 
        h2 { color: #58a6ff; margin: 0; font-size: 1.4em; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.8em; color: #8b949e; margin-bottom: 5px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; width: 95%; }
        .button-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-send { background: #238636; color: white; grid-column: span 2; }
        .btn-clear { background: #30363d; color: #c9d1d9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <img src="logo.png" alt="Logo" class="logo-img">
            <h2>THE WARRIOR BROTHERS</h2>
        </div>
        <div class="grid">
            <div class="full-width"><label>👤 Nombre del Cliente:</label><input type="text" id="cliente" placeholder="Ej: MICHAEL GUERRERO"></div>
            <div><label>📱 WhatsApp:</label><input type="text" id="tel" placeholder="09..."></div>
            <div><label>📅 Entrega Estimada:</label><input type="date" id="fecha"></div>
            <div class="full-width"><label>👟 Artículo (zapato, mochila, etc):</label><input type="text" id="articulo" placeholder="Ej: zapatos Puma"></div>
            <div class="full-width"><label>🛠️ Trabajo a realizar:</label><input type="text" id="trabajo" placeholder="Ej: coser y reforzar"></div>
            <div><label>💰 Total ($):</label><input type="number" id="total" value="0.00" step="0.01"></div>
            <div><label>💵 Abono ($):</label><input type="number" id="abono" value="0.00" step="0.01"></div>
        </div>
        <div class="button-container">
            <button class="btn btn-send" onclick="enviarWhatsApp()">💾 GENERAR Y ENVIAR</button>
            <button class="btn btn-clear" onclick="limpiar()">🔄 LIMPIAR</button>
        </div>
    </div>

    <script>
        document.getElementById('fecha').valueAsDate = new Date();
        function enviarWhatsApp() {
            const cliente = document.getElementById('cliente').value.toUpperCase();
            const tel = document.getElementById('tel').value;
            const fecha = document.getElementById('fecha').value.split('-').reverse().join('/');
            const articulo = document.getElementById('articulo').value.toLowerCase();
            const trabajo = document.getElementById('trabajo').value;
            const total = parseFloat(document.getElementById('total').value).toFixed(2);
            const abono = parseFloat(document.getElementById('abono').value).toFixed(2);
            const saldo = (total - abono).toFixed(2);

            const msg = `🛡️ *THE WARRIOR BROTHERS*\n` +
                        `-------------------------------------------\n` +
                        `¡Hola *${cliente}*! ✅\n` +
                        `Confirmamos la recepción de su *${articulo}*:\n\n` +
                        `🛠️ *Trabajo:* ${trabajo}\n` +
                        `-------------------------------------------\n` +
                        `💰 *Total:* $${total}\n` +
                        `💵 *Abono:* $${abono}\n` +
                        `💳 *Saldo pendiente:* *$${saldo}*\n` +
                        `-------------------------------------------\n` +
                        `📅 *Entrega estimada:* ${fecha}\n\n` +
                        `⚠️ *NOTA IMPORTANTE:*\n` +
                        `• Una vez ingresada la obra, no se realizarán devoluciones de abonos ni entregas antes de la fecha acordada.\n` +
                        `• Los trabajos no retirados pasados los 2 meses serán liquidados para cubrir costos de material.\n\n` +
                        `¡Gracias por su confianza! ✨`;

            let num = tel.startsWith('0') ? tel.substring(1) : tel;
            window.open(`https://wa.me/593${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        function limpiar() { location.reload(); }
    </script>
</body>
</html>
